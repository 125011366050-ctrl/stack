services:
  - type: web
    name: cdss-api
    runtime: python
    plan: free
    buildCommand: |
      chmod +x build.sh
      ./build.sh
    startCommand: |
      uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PIP_NO_CACHE_DIR
        value: 1
